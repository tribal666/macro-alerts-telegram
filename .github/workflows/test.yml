name: Macro News

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
    
concurrency:
  group: macro-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"   

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest state
        run: git pull origin main
        
      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"
          echo "triggering_actor=${{ github.triggering_actor }}"
          echo "ref=${{ github.ref }}"  
          
      - name: Dump event payload path
        run: |
          echo "event_path=$GITHUB_EVENT_PATH"
          cat "$GITHUB_EVENT_PATH"    

      - name: Run
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DEBUG_NEXT: "0"
        run: |
          python main.py

      - name: Commit state
        run: |
          git add state.json
          git commit -m "Update bot state [skip ci]" || echo "No changes"
          git push    

      - name: Commit state.json
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json

            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Update bot state [skip ci]"
              git fetch origin
              git reset --soft origin/main
              git push
            fi
          else
            echo "state.json not found, nothing to commit"
          fi

